<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="cv1WMWm4mWiINjIwhr2Gf9Ur48tG-jJPECdMdgjS4Gg" />
<title>Efoot Market SN — Comptes eFootball en vente</title>
<meta name="description" content="Efoot Market SN — Achetez des comptes eFootball vérifiés en toute confiance. Paiement en FCFA, contact direct via WhatsApp.">
<link rel="icon" type="image/png" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#0b1410">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="inner">
    <div class="brand">EFOOT MARKET<span> SN</span></div>
    <div class="tagline">Comptes eFootball vérifiés — paiement en FCFA</div>
    <div id="buyerArea" class="buyer-area"></div>
  </div>
</header>

<div id="banner" class="promo-banner" style="display:none;"></div>
<div id="countdown" class="countdown" style="display:none;"></div>

<main class="container">
  <section id="flashSection" style="display:none;">
    <h2 class="section-title flash-title">🔥 Ventes Flash</h2>
    <div id="flashGrid" class="grid flash-grid"></div>
  </section>

  <h2 class="section-title" id="catalogTitle" style="display:none;">Tous les comptes</h2>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty-state" style="display:none;">
    Aucun compte en vente pour le moment. Reviens bientôt !
  </div>
</main>

<!-- Overlay affiché pendant les étapes de l'achat -->
<div id="stepOverlay" class="step-overlay" style="display:none;">
  <div class="step-box">
    <div id="stepImgWrap"></div>
    <div class="step-title" id="stepTitle">Préparation…</div>
    <div class="spinner" id="stepSpinner"></div>
    <p id="stepText">On prépare la photo du compte, puis WhatsApp va s'ouvrir automatiquement.</p>
  </div>
</div>

<!-- Modal connexion / inscription -->
<div id="authModal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <button class="modal-close" id="authModalClose">&times;</button>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin">Connexion</button>
      <button class="auth-tab" id="tabRegister">Créer un compte</button>
    </div>

    <form id="loginForm" class="auth-form">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" required>
      <label for="loginPassword">Mot de passe</label>
      <input type="password" id="loginPassword" required>
      <button type="submit" class="btn-primary">Se connecter</button>
      <div class="error-msg" id="loginErr"></div>
    </form>

    <form id="registerForm" class="auth-form" style="display:none;">
      <label for="regEmail">Email</label>
      <input type="email" id="regEmail" required>
      <label for="regPhone">Téléphone (optionnel)</label>
      <input type="text" id="regPhone">
      <label for="regPassword">Mot de passe (6 caractères min.)</label>
      <input type="password" id="regPassword" required minlength="6">
      <button type="submit" class="btn-primary">Créer mon compte</button>
      <div class="error-msg" id="registerErr"></div>
    </form>
  </div>
</div>

<!-- Panneau "Mon compte" : favoris + paramètres -->
<div id="accountPanel" class="modal-overlay" style="display:none;">
  <div class="modal-box wide">
    <button class="modal-close" id="accountPanelClose">&times;</button>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabFavorites">Mes favoris</button>
      <button class="auth-tab" id="tabSettings">Paramètres</button>
    </div>

    <div id="favoritesPane">
      <div id="favoritesGrid" class="grid" style="margin-top:16px;"></div>
      <div id="favoritesEmpty" class="empty-state" style="display:none;">Aucun favori pour le moment.</div>
    </div>

    <form id="settingsForm" class="auth-form" style="display:none;">
      <label for="setEmail">Email</label>
      <input type="email" id="setEmail" required>
      <label for="setPhone">Téléphone</label>
      <input type="text" id="setPhone">
      <label for="setPassword">Nouveau mot de passe (laisser vide pour ne pas changer)</label>
      <input type="password" id="setPassword" minlength="6">
      <button type="submit" class="btn-primary">Enregistrer</button>
      <div class="error-msg" id="settingsErr"></div>
      <button type="button" class="btn-outline" id="logoutBuyerBtn" style="width:100%;margin-top:10px;">Se déconnecter</button>
    </form>
  </div>
</div>

<!-- Aperçu photo en plein écran -->
<div id="lightbox" class="lightbox" style="display:none;">
  <img id="lightboxImg" src="" alt="Aperçu du compte">
</div>

<script src="/js/buyer.js"></script>
<script src="/js/catalog.js"></script>
</body>
</html>
